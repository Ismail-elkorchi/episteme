name: Release audit

on:
  workflow_dispatch:
  schedule:
    - cron: "29 4 * * 1"

permissions:
  contents: read

jobs:
  release_audit:
    name: Release parity and publishability audit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read tool versions
        id: toolversions
        run: |
          echo "node=$(awk '/^nodejs /{print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"
          echo "deno=$(awk '/^deno /{print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"
          echo "bun=$(awk '/^bun /{print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ steps.toolversions.outputs.node }}
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2
        with:
          deno-version: ${{ steps.toolversions.outputs.deno }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: ${{ steps.toolversions.outputs.bun }}

      - name: Install
        run: npm ci

      - name: Release parity gates
        run: |
          set -euo pipefail
          npm run check:ci
          npm run check:deno
          npm run check:bun
          npm pack --dry-run
          npx -y jsr publish --dry-run --allow-dirty
