name: Bug report
description: Report incorrect behavior with a minimal reproduction.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Summary
      description: What happened and what was expected?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Provide minimal synthetic input and exact commands.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Runtime matrix
      description: Node/Deno/Bun results.
      placeholder: |
        node: pass/fail
        deno: pass/fail
        bun: pass/fail
    validations:
      required: true
