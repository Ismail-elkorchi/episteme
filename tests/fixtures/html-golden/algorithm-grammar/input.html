<!doctype html>
<html>
<head><title>Algorithm Grammar</title></head>
<body>
  <h1 id="alg">Algorithms</h1>
  <div class="algorithm">
    <ol>
      <li>Initialize state</li>
      <li>Return result</li>
    </ol>
  </div>
  <pre class="grammar">Expr ::= Term ("+" Term)*</pre>
  <table id="tbl">
    <thead><tr><th>Name</th><th>Value</th></tr></thead>
    <tbody>
      <tr><td>A</td><td>1</td></tr>
      <tr><td>B</td><td>2</td></tr>
    </tbody>
  </table>
</body>
</html>
